name: clean_connect
description: "A commercial-grade Waste Management Platform built with Flutter."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management & Hooks
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3
  flutter_hooks: ^0.21.1
  hooks_riverpod: ^3.3.2

  # Navigation & Network
  go_router: ^17.3.0
  dio: ^5.5.0+1

  # Models & Serialization
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Storage & Caching
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.1

  # Location & Maps
  geolocator: ^14.0.3
  google_maps_flutter: ^2.7.0

  # Device Features & Permissions
  permission_handler: ^12.0.3
  mobile_scanner: ^7.2.1
  image_picker: ^1.1.2
  url_launcher: ^6.3.0

  # Notifications & Firebase
  firebase_core: ^4.12.0
  firebase_auth: ^6.5.6
  cloud_firestore: ^6.7.1
  firebase_messaging: ^16.4.2
  flutter_local_notifications: ^22.0.1

  # Utilities
  intl: ^0.20.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.11
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.4
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
